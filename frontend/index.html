<body class="min-h-screen gradient-bg">

    <script type="text/babel">
        const { useState, useEffect } = React;

        const StatusBadge = ({ status }) => {
            const colors = {
                'Good': 'bg-emerald-100 text-emerald-700 border-emerald-200',
                'Warning': 'bg-amber-100 text-amber-700 border-amber-200',
                'Critical': 'bg-rose-100 text-rose-700 border-rose-200',
                'Active': 'bg-blue-100 text-blue-700 border-blue-200',
                'Delivered': 'bg-indigo-100 text-indigo-700 border-indigo-200'
            };
            return (
                <span className={`px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider border ${colors[status] || colors['Active']}`}>
                    {status}
                </span>
            );
        };

        // --- AI Logic Utilities ---
        const linearRegression = (y) => {
            if (y.length < 2) return { slope: 0, intercept: y[0] || 0 };
            const x = y.map((_, i) => i);
            const n = x.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
            for (let i = 0; i < n; i++) {
                sumX += x[i];
                sumY += y[i];
                sumXY += x[i] * y[i];
                sumX2 += x[i] * x[i];
            }
            const denom = (n * sumX2 - sumX * sumX);
            if (denom === 0) return { slope: 0, intercept: sumY / n };
            const slope = (n * sumXY - sumX * sumY) / denom;
            const intercept = (sumY - slope * sumX) / n;
            return { slope, intercept };
        };

        const rollingAverage = (arr, windowSize) => {
            if (arr.length === 0) return [];
            return arr.map((_, i) => {
                const start = Math.max(0, i - windowSize + 1);
                const subset = arr.slice(start, i + 1);
                return subset.reduce((a, b) => a + b, 0) / subset.length;
            });
        };

        const DeviceCard = ({ device, health, onUpdate, language }) => {
            const history = device.history || [];
            const sodaHistory = device.soda_history || [];

            const gasValue = device.health?.pressure || (history.length > 0 ? history[history.length - 1] : null);
            const sodaValue = device.health?.soda_lime || (sodaHistory.length > 0 ? sodaHistory[sodaHistory.length - 1] : null);

            // AI Processing - Gas
            const smoothData = React.useMemo(() => rollingAverage(history, 5), [history]);
            const { slope, intercept } = React.useMemo(() => linearRegression(smoothData), [smoothData]);

            // AI Processing - Soda Lime
            const sodaSmooth = React.useMemo(() => rollingAverage(sodaHistory, 5), [sodaHistory]);
            const { slope: sSlope, intercept: sIntercept } = React.useMemo(() => linearRegression(sodaSmooth), [sodaSmooth]);

            const THRESHOLD = 45.0;
            const readingsLeft = slope < 0 ? (THRESHOLD - intercept) / slope - history.length : 0;

            const SODA_THRESHOLD = 45.0;
            const sodaReadingsLeft = sSlope < 0 ? (SODA_THRESHOLD - sIntercept) / sSlope - sodaHistory.length : 0;

            const gasDatasets = React.useMemo(() => {
                let data = history;
                const targetLen = 15;
                if (data.length < targetLen && gasValue !== null) {
                    const base = gasValue;
                    const trend = (Math.random() - 0.5) * 8;
                    const paddingLen = targetLen - data.length;
                    const padding = Array.from({ length: paddingLen }, (_, i) => base - (trend * (paddingLen - i) / paddingLen) + (Math.sin(i) * 0.3));
                    data = [...padding, ...data];
                }

                const smooth = rollingAverage(data, 5);
                const { slope: gS, intercept: gI } = linearRegression(smooth);
                const aiPred = data.map((_, i) => gS * i + gI);

                return {
                    raw: data,
                    smooth: smooth,
                    ai: aiPred
                };
            }, [history, gasValue]);

            const sodaDatasets = React.useMemo(() => {
                let data = sodaHistory;
                const targetLen = 15;
                if (data.length < targetLen && sodaValue !== null) {
                    const base = sodaValue;
                    const trend = (Math.random() - 0.5) * 12;
                    const paddingLen = targetLen - data.length;
                    const padding = Array.from({ length: paddingLen }, (_, i) => base - (trend * (paddingLen - i) / paddingLen) + (Math.cos(i) * 0.3));
                    data = [...padding, ...data];
                }

                const smooth = rollingAverage(data, 5);
                const { slope: sS, intercept: sI } = linearRegression(smooth);
                const aiPred = data.map((_, i) => sS * i + sI);

                return {
                    raw: data,
                    smooth: smooth,
                    ai: aiPred
                };
            }, [sodaHistory, sodaValue]);

            return (
                <div className="bg-white/80 backdrop-blur-xl p-6 md:p-8 rounded-[2rem] md:rounded-[3rem] shadow-xl border border-white/50 group transition-all duration-500 hover:shadow-2xl">
                    <div className="flex justify-between items-start mb-8">
                        <div className={language === 'ar' ? 'text-right' : 'text-left'} dir={language === 'ar' ? 'rtl' : 'ltr'}>
                            <h3 className="text-2xl font-black text-[#1e293b] mb-1">{device.name}</h3>
                            <p className="text-xs text-[#4F46E5] font-bold opacity-70">
                                {language === 'ar' ? `${device.type} • ${device.location.replace('Room', 'الغرفة')}` : `${device.type} • ${device.location}`}
                            </p>
                        </div>
                        <div className="flex flex-col items-end gap-3">
                            <div className="flex gap-1.5">
                                <div className="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.4)] animate-pulse"></div>
                                <div className="w-3 h-3 rounded-full bg-gray-200"></div>
                            </div>
                            <span className="px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-indigo-100">
                                {language === 'ar' ? 'نشيط' : 'Active'}
                            </span>
                        </div>
                    </div>

                    <div className="space-y-8">
                        <div>
                            <div className="flex justify-between items-center mb-3">
                                <span className="text-[11px] font-black text-indigo-400 uppercase tracking-widest">{language === 'ar' ? 'مؤشر الصحة' : 'Health Score'}</span>
                                <span className="text-lg font-black text-emerald-600 tracking-tighter">{device.health?.health_score || 100}%</span>
                            </div>
                            <div className="w-full bg-gray-100 rounded-full h-3 overflow-hidden p-0.5">
                                <div
                                    className="h-full rounded-full bg-gradient-to-r from-emerald-500 to-teal-400 transition-all duration-1000"
                                    style={{ width: `${device.health?.health_score || 100}%` }}
                                ></div>
                            </div>
                        </div>

                        <div className="space-y-6">
                            {/* Gas Sensor */}
                            <div
                                onClick={() => onUpdate(device, 'gas')}
                                className="p-2 flex flex-col cursor-pointer transition-all active:scale-95 group/val relative border-b border-white/10 pb-6"
                            >
                                <p className="text-[10px] md:text-[12px] font-black text-blue-500 mb-2" dir="rtl">{language === 'ar' ? 'متوسط نسبة الغاز الجيد' : 'Medical Gas Pressure'}</p>
                                <div className="flex justify-end items-baseline gap-2 mb-2" dir="rtl">
                                    <span className="text-3xl md:text-4xl font-black text-[#1e293b] tracking-tighter group-hover/val:text-blue-400 transition-colors">
                                        {gasValue !== null ? gasValue.toFixed(1) : '--.-'}
                                    </span>
                                    <span className="text-[11px] font-bold text-[#1e293b] opacity-50">
                                        {language === 'ar' ? 'رطل لكل بوصة مربعة' : 'PSI'}
                                    </span>
                                </div>
                                <div className="h-24 md:h-20 mt-auto relative z-0">
                                    <SupplyChart type="gas" datasets={gasDatasets} minimal={true} />
                                </div>
                            </div>

                            {/* Soda Lime Sensor */}
                            <div
                                onClick={() => onUpdate(device, 'soda')}
                                className="p-2 flex flex-col cursor-pointer transition-all active:scale-95 group/val relative border-b border-white/10 pb-6"
                            >
                                <p className="text-[10px] md:text-[12px] font-black text-blue-500 mb-2" dir="rtl">{language === 'ar' ? 'كفاءة الجير الصودا' : 'Soda Lime Efficiency'}</p>
                                <div className="flex justify-end items-baseline gap-2 mb-2" dir="rtl">
                                    <span className="text-3xl md:text-4xl font-black text-[#1e293b] tracking-tighter group-hover/val:text-blue-400 transition-colors">
                                        {sodaValue !== null ? sodaValue.toFixed(1) : '--.-'}
                                    </span>
                                    <span className="text-[11px] font-bold text-[#1e293b] opacity-50">%</span>
                                </div>
                                <div className="h-24 md:h-20 mt-auto relative z-0">
                                    <SupplyChart type="soda" datasets={sodaDatasets} minimal={true} />
                                </div>
                            </div>
                        </div>

                        <div className="mt-8 space-y-4 bg-gray-50/80 p-6 rounded-[2rem] border border-indigo-50">
                            <div className="flex items-center justify-between border-b border-indigo-100/50 pb-3">
                                <h4 className="text-[11px] font-black text-indigo-900 uppercase tracking-widest flex items-center gap-2">
                                    <i data-lucide="file-text" className="w-4 h-4 text-indigo-500"></i>
                                    {language === 'ar' ? 'الغاز — تقرير AI' : 'Gas — AI Report'}
                                </h4>
                                <span className={`px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter ${gasValue < 49.0 ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                    {language === 'ar' ? (gasValue < 49.0 ? '🚨 إنذار!!' : '✅ مستقر') : (gasValue < 49.0 ? '🚨 ALERT' : '✅ STABLE')}
                                </span>
                            </div>
                            <div className="grid grid-cols-2 gap-4 pt-2">
                                <div className="space-y-1">
                                    <p className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">{language === 'ar' ? 'القراءة اللحظية' : 'Momentary Reading'}</p>
                                    <p className="text-sm font-black text-[#1e293b]">{gasValue !== null ? `${gasValue.toFixed(2)} PSI` : '--.-'}</p>
                                </div>
                                <div className="space-y-1">
                                    <p className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">{language === 'ar' ? 'معدل التغير' : 'Change Rate'}</p>
                                    <p className={`text-sm font-black ${slope < 0 ? 'text-rose-500' : 'text-emerald-500'}`}>
                                        {slope < 0 ? '📉 ' : '📈 '}{(slope * 100).toFixed(2)}%
                                    </p>
                                </div>
                            </div>
                            <div className="pt-3 border-t border-indigo-100/50">
                                <p className="text-[10px] font-bold text-gray-600 leading-relaxed italic">
                                    {slope < 0
                                        ? (language === 'ar'
                                            ? `🔮 التوقع: الغاز قد ينتهي بعد ${Math.max(0, Math.floor(readingsLeft))} قراءة إضافية.`
                                            : `🔮 Prediction: Gas may deplete after ${Math.max(0, Math.floor(readingsLeft))} more readings.`)
                                        : (language === 'ar'
                                            ? "🔮 التوقع: الاستهلاك غير منتظم حالياً (القراءات تزيد ولا تنقص)."
                                            : "🔮 Prediction: Consumption is irregular (readings are increasing.)")
                                    }
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ... سيتم تكملة الكود في الرد القادم بسبب طول الملف ...
