<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED-GUARD PRO | محمد مصطفى</title>
    <script src="lib/react.development.js"></script>
    <script src="lib/react-dom.development.js"></script>
    <script src="lib/babel.min.js"></script>
    <script src="lib/tailwindcss.js"></script>
    <script src="lib/chart.js"></script>
    <script src="lib/lucide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .nav-active {
            background-color: #98FF98; /* Mint Green */
            color: #1e293b;
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(152, 255, 152, 0.4);
        }
        .animate-pulse-soft {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- مكون الرسم البياني المصغر ---
        const MiniChart = ({ data, color }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map((_, i) => i),
                        datasets: [{
                            data: data,
                            borderColor: color,
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: true,
                            backgroundColor: color + '10',
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { x: { display: false }, y: { display: false } }
                    }
                });
                return () => chartInstance.current?.destroy();
            }, [data]);

            return <div className="h-16 w-full"><canvas ref={chartRef}></canvas></div>;
        };

        // --- مكون كارت الجهاز (الأساسي) ---
        const DeviceCard = ({ device }) => {
            // منطق الـ AI بتاعك
            const gasValue = device.history[device.history.length - 1];
            const sodaValue = device.soda_history[device.soda_history.length - 1];

            return (
                <div className="glass-card p-6 rounded-[2.5rem] shadow-sm mb-6 transition-all active:scale-[0.98]">
                    <div className="flex justify-between items-start mb-4">
                        <div>
                            <h3 className="text-xl font-black text-slate-800">{device.name}</h3>
                            <span className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">{device.location}</span>
                        </div>
                        <div className="bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-black">ACTIVE</div>
                    </div>

                    <div className="grid grid-cols-1 gap-6">
                        {/* Gas Section */}
                        <div className="space-y-2">
                            <div className="flex justify-between text-xs font-bold text-slate-500">
                                <span>ضغط الغاز الطبي</span>
                                <span className="text-indigo-600">{gasValue} PSI</span>
                            </div>
                            <MiniChart data={device.history} color="#4F46E5" />
                        </div>

                        {/* Soda Lime Section */}
                        <div className="space-y-2">
                            <div className="flex justify-between text-xs font-bold text-slate-500">
                                <span>كفاءة الجير الصودا</span>
                                <span className="text-emerald-500">{sodaValue}%</span>
                            </div>
                            <MiniChart data={device.soda_history} color="#10b981" />
                        </div>
                    </div>

                    <div className="mt-4 pt-4 border-t border-slate-100">
                        <p className="text-[11px] italic text-slate-400">
                            🔮 توقع الذكاء الاصطناعي: استقرار تام خلال الـ 12 ساعة القادمة.
                        </p>
                    </div>
                </div>
            );
        };

        // --- المكون الرئيسي App ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            
            // بيانات تجريبية (الداتا اللي بتيجي من المستشعرات)
            const [devices] = useState([
                {
                    id: 1,
                    name: "Anesthesia Unit 01",
                    location: "غرفة العمليات A",
                    history: [80, 78, 75, 72, 70, 68, 65],
                    soda_history: [95, 94, 92, 90, 88, 85, 82]
                },
                {
                    id: 2,
                    name: "Anesthesia Unit 02",
                    location: "غرفة الطوارئ",
                    history: [40, 42, 45, 43, 41, 39, 38],
                    soda_history: [60, 58, 55, 52, 50, 48, 45]
                }
            ]);

            return (
                <div className="pb-32">
                    {/* Header */}
                    <header className="p-6 pt-10 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-black text-slate-900 tracking-tighter">MED-GUARD</h1>
                            <p className="text-xs font-bold text-slate-400">مرحباً، مهندس محمد</p>
                        </div>
                        <div className="w-12 h-12 bg-[#E6E6FA] rounded-2xl flex items-center justify-center text-indigo-600">
                            <i data-lucide="bell" className="w-6 h-6"></i>
                        </div>
                    </header>

                    {/* Dashboard Status */}
                    <section className="px-6 mb-8">
                        <div className="bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-xl shadow-slate-200">
                            <div className="flex justify-between items-center mb-6">
                                <div className="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center">
                                    <i data-lucide="shield-check" className="text-[#98FF98]"></i>
                                </div>
                                <span className="text-[10px] font-black opacity-50 uppercase tracking-widest">System Health</span>
                            </div>
                            <h2 className="text-3xl font-black mb-1">98.2%</h2>
                            <p className="text-xs opacity-60">جميع الأجهزة تعمل بكفاءة عالية</p>
                        </div>
                    </section>

                    {/* Devices List */}
                    <section className="px-6">
                        <h2 className="text-lg font-black text-slate-800 mb-4">الأجهزة المراقبة</h2>
                        {devices.map(d => <DeviceCard key={d.id} device={d} />)}
                    </section>

                    {/* Mobile Navigation Bar */}
                    <nav className="fixed bottom-6 left-6 right-6 h-20 bg-white shadow-2xl rounded-[2.5rem] flex justify-around items-center px-4 border border-slate-100 z-50">
                        <button onClick={() => setActiveTab('home')} className={`p-4 rounded-2xl transition-all duration-300 ${activeTab === 'home' ? 'nav-active' : 'text-slate-400'}`}>
                            <i data-lucide="home" className="w-6 h-6"></i>
                        </button>
                        <button onClick={() => setActiveTab('activity')} className={`p-4 rounded-2xl transition-all duration-300 ${activeTab === 'activity' ? 'nav-active' : 'text-slate-400'}`}>
                            <i data-lucide="activity" className="w-6 h-6"></i>
                        </button>
                        <button className="p-4 rounded-2xl bg-slate-900 text-[#98FF98] shadow-lg -translate-y-8 border-[6px] border-white">
                            <i data-lucide="plus" className="w-6 h-6"></i>
                        </button>
                        <button onClick={() => setActiveTab('users')} className={`p-4 rounded-2xl transition-all duration-300 ${activeTab === 'users' ? 'nav-active' : 'text-slate-400'}`}>
                            <i data-lucide="users" className="w-6 h-6"></i>
                        </button>
                        <button onClick={() => setActiveTab('settings')} className={`p-4 rounded-2xl transition-all duration-300 ${activeTab === 'settings' ? 'nav-active' : 'text-slate-400'}`}>
                            <i data-lucide="settings" className="w-6 h-6"></i>
                        </button>
                    </nav>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
        
        // تشغيل أيقونات Lucide بعد التحميل
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
