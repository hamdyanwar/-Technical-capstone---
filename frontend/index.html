<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Med-Guard Login</title>
    <style>
        body { margin: 0; padding: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: #1e293b; margin-bottom: 20px; font-size: 24px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 5px rgba(59,130,246,0.5); }
        button { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="card">
        <h2>تسجيل الدخول</h2>
        <input type="text" placeholder="اسم المستخدم">
        <input type="number" placeholder="كود المستشفى (أرقام)" pattern="\dp*">
        <select>
            <option value="" disabled selected>اختر الوظيفة...</option>
            <option>طبيب</option>
            <option>ممرض</option>
            <option>فني</option>
        </select>
        <button onclick="alert('تم تسجيل الدخول بنجاح')">دخول</button>
    </div>
</body>
</html>
