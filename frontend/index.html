<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDICAL ASSISTANT | PREMIUM HUB</title>
    
    <!-- تحميل المكتبات اللازمة لعمل التصميم والذكاء الاصطناعي -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; margin: 0; background-color: #0f172a; color: white; overflow-x: hidden; }
        .mesh-bg {
            background: radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.3) 0px, transparent 50%),
                        radial-gradient(at 100% 0%, rgba(0, 161, 155, 0.3) 0px, transparent 50%),
                        radial-gradient(at 50% 50%, rgba(15, 23, 42, 1) 0px, transparent 100%);
            min-height: 100vh;
            position: relative;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        .sidebar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(30px); border-left: 1px solid rgba(255, 255, 255, 0.05); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [localIp, setLocalIp] = useState('127.0.0.1');
            const [devices] = useState([
                { id: 1, name: "Mindray A7", location: "غرفة العمليات 1", type: "Anesthesia", health: { pressure: 52.4 } },
                { id: 2, name: "Dräger Primus", location: "غرفة العمليات 3", type: "Ventilator", health: { pressure: 48.1 } }
            ]);

            useEffect(() => {
                const session = localStorage.getItem('medguard_session');
                if (session) setIsLoggedIn(true);
            }, []);

            const getMobileUrl = () => {
                const hostname = window.location.hostname;
                if (hostname.includes('github.io')) {
                    const path = window.location.pathname.split('/').slice(0, -1).join('/');
                    return `${window.location.protocol}//${hostname}${path}/mobile.html`;
                }
                return `http://${localIp}:8000/mobile.html`;
            };

            if (!isLoggedIn) return (
                <div className="mesh-bg flex items-center justify-center p-6">
                    <div className="glass p-16 w-full max-w-lg text-center border-white/20">
                        <img src="logo_v4.png" className="w-48 mx-auto mb-10 drop-shadow-2xl" />
                        <h1 className="text-4xl font-black mb-12 tracking-tighter uppercase italic">Medical Assistant</h1>
                        <button 
                            onClick={() => {localStorage.setItem('medguard_session', 'true'); setIsLoggedIn(true);}}
                            className="w-full py-7 bg-indigo-600 hover:bg-indigo-500 text-white rounded-[2.5rem] font-black text-xl shadow-2xl transition-all active:scale-95"
                        >
                            دخول المختبر الذكي
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="mesh-bg flex flex-col lg:flex-row min-h-screen" dir="rtl">
                    {/* Sidebar */}
                    <aside className="w-full lg:w-96 sidebar p-10 flex flex-col gap-8 relative z-20">
                        <div className="flex items-center gap-6 mb-12">
                            <img src="logo_v4.png" className="w-20 h-20" />
                            <div className="text-right">
                                <h2 className="text-2xl font-black text-white">MED-GUARD</h2>
                                <p className="text-[10px] text-indigo-400 font-black tracking-widest uppercase">System Active</p>
                            </div>
                        </div>

                        <nav className="flex-1 space-y-4">
                            <button className="w-full flex items-center gap-5 px-8 py-6 bg-indigo-600 text-white rounded-[2.5rem] font-black text-sm shadow-xl">
                                <i data-lucide="layout-dashboard"></i> لوحة التحكم
                            </button>
                        </nav>

                        <div className="mt-auto glass p-8 bg-white/5 text-center">
                            <p className="text-[10px] text-slate-400 font-black mb-6 uppercase tracking-widest">Mobile Sync QR</p>
                            <div className="bg-white p-4 rounded-3xl inline-block shadow-2xl">
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(getMobileUrl())}`} className="w-36 h-36" />
                            </div>
                            <p className="text-[10px] font-black text-indigo-300 mt-6 pulse">اتصال الموبايل جاهز</p>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-10 lg:p-20 overflow-y-auto">
                        <header className="flex justify-between items-center mb-20">
                            <div className="text-right">
                                <h2 className="text-6xl font-black text-white tracking-tighter mb-4">المراقبة الحية</h2>
                                <p className="text-indigo-300 font-black uppercase text-xs tracking-[0.5em] opacity-60">Real-time Clinical HUD</p>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-12">
                            {devices.map(dev => (
                                <div key={dev.id} className="glass p-12 group transition-all hover:scale-[1.02] duration-500">
                                    <div className="flex justify-between items-start mb-12">
                                        <div className="text-right">
                                            <h3 className="text-4xl font-black text-white mb-3">{dev.name}</h3>
                                            <p className="text-sm text-indigo-400 font-black uppercase tracking-widest">{dev.location}</p>
                                        </div>
                                        <div className="px-5 py-2 bg-emerald-500/10 text-emerald-400 rounded-full text-xs font-black border border-emerald-500/20">ONLINE</div>
                                    </div>
                                    <div className="space-y-12">
                                        <div>
                                            <p className="text-[11px] font-black text-white/30 mb-4 uppercase tracking-widest">ضغط غاز الأكسجين</p>
                                            <div className="flex items-baseline gap-4">
                                                <span className="text-7xl font-black text-white tracking-tighter">{dev.health.pressure.toFixed(1)}</span>
                                                <span className="text-lg font-black text-white/20">PSI</span>
                                            </div>
                                        </div>
                                        <div className="pt-8 border-t border-white/5">
                                            <p className="text-sm font-bold text-white/40 italic leading-relaxed">
                                                🔮 تحليل الذكاء الاصطناعي: حالة الجهاز مستقرة جداً ولا توجد تنبيهات حالية.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // تفعيل الأيقونات
        setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
