<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDICAL ASSISTANT - PRO</title>
    <script src="lib/react.development.js"></script>
    <script src="lib/react-dom.development.js"></script>
    <script src="lib/babel.min.js"></script>
    <script src="lib/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="lib/lucide.js"></script>
    <script src="lib/chart.js"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #ffffff;
        }

        /* الطبقة الضبابية الخلفية */
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        /* --- تعديلات التقسيم والمساحات الجديدة للموديلات --- */
        .glass-modal {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            border: 2px solid #E6E6FA; /* Lavender */
            border-radius: 32px;
            padding: 35px 25px;
            display: flex;
            flex-direction: column;
            gap: 20px; /* مسافة موحدة بين العناصر */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .input-label {
            font-size: 13px;
            font-weight: 700;
            color: #475569;
            padding-right: 5px;
        }

        .custom-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E6E6FA;
            border-radius: 16px;
            background: #fdfdfd;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .custom-input:focus {
            border-color: #98FF98; /* Mint Green */
            box-shadow: 0 0 12px rgba(152, 255, 152, 0.3);
            outline: none;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #E6E6FA;
            color: #1e293b;
            border-radius: 18px;
            font-weight: 900;
            transition: 0.3s all ease;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #98FF98;
            transform: translateY(-2px);
        }

        /* الأنميشن الخاص بالنبض والـ AI */
        .pulse-thinking {
            animation: pulse-hud 2s infinite;
        }

        @keyframes pulse-hud {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }

        .chart-container {
            height: 120px;
            position: relative;
        }
    </style>
</head>

<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- كامبوننت الموديل الجديد بالمساحات المظبوطة ---
        const CustomModal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
                    <div className="glass-modal w-full max-w-md animate-in fade-in zoom-in duration-300">
                        <div className="flex justify-between items-center mb-2">
                            <h3 className="text-xl font-black text-[#1e4548]">{title}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-rose-50 rounded-full text-rose-400 transition-colors">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                        {children}
                    </div>
                </div>
            );
        };

        // --- منطق الرسم البياني والـ AI ---
        const SupplyChart = ({ data, type }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const ctx = canvasRef.current.getContext('2d');
                const chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map((_, i) => i),
                        datasets: [{
                            data: data,
                            borderColor: '#4F46E5',
                            backgroundColor: 'rgba(79, 70, 229, 0.05)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            borderWidth: 3
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { display: false },
                            y: { display: true, min: 0, max: 100, ticks: { display: false }, grid: { color: 'rgba(0,0,0,0.05)' } }
                        }
                    }
                });
                return () => chart.destroy();
            }, [data]);
            return <canvas ref={canvasRef} />;
        };

        const App = () => {
            const [showLogin, setShowLogin] = useState(false);
            const [devices, setDevices] = useState([
                { id: 1, name: "جهاز التخدير A1", type: "مدى متقدم", location: "غرفة 302", health: 94, gas: [80, 75, 72, 68, 65] },
                { id: 2, name: "مراقب الغازات B2", type: "حساس دقيق", location: "غرفة 105", health: 88, gas: [40, 42, 38, 35, 30] }
            ]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [showLogin]);

            return (
                <div className="p-6 bg-slate-50 min-h-screen">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-10">
                        <div>
                            <h1 className="text-3xl font-black text-slate-800 tracking-tighter">MEDICAL ASSISTANT</h1>
                            <p className="text-sm font-bold text-indigo-500 uppercase">نظام المراقبة الذكي</p>
                        </div>
                        <button 
                            onClick={() => setShowLogin(true)}
                            className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition-all active:scale-95"
                        >
                            <i data-lucide="user" className="text-indigo-600"></i>
                        </button>
                    </div>

                    {/* Dashboard Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {devices.map(device => (
                            <div key={device.id} className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 relative overflow-hidden group">
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <h2 className="text-2xl font-black text-slate-800">{device.name}</h2>
                                        <p className="text-xs font-bold text-slate-400">{device.location}</p>
                                    </div>
                                    <span className="px-4 py-1 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black uppercase">نشط الآن</span>
                                </div>

                                <div className="mb-6">
                                    <div className="flex justify-between mb-2">
                                        <span className="text-[11px] font-black text-slate-400 uppercase">ضغط الغاز الطبي</span>
                                        <span className="text-lg font-black text-indigo-600">{device.gas[device.gas.length-1]}%</span>
                                    </div>
                                    <div className="chart-container">
                                        <SupplyChart data={device.gas} />
                                    </div>
                                </div>

                                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                    <p className="text-[10px] font-bold text-slate-500 italic leading-relaxed">
                                        {device.gas[device.gas.length-1] < 40 
                                            ? "⚠️ تحذير: التوقعات تشير إلى انخفاض حرج في الضغط خلال 15 دقيقة." 
                                            : "✅ مستقر: استهلاك الغاز ضمن الحدود الطبيعية."}
                                    </p>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* موديل تسجيل الدخول بتعديلات الترتيب والمساحات */}
                    <CustomModal 
                        isOpen={showLogin} 
                        onClose={() => setShowLogin(false)} 
                        title="تسجيل دخول النظام"
                    >
                        <div className="input-wrapper">
                            <label className="input-label">اسم المهندس المختص</label>
                            <input type="text" className="custom-input" placeholder="اكتب اسمك بالكامل..." />
                        </div>

                        <div className="input-wrapper">
                            <label className="input-label">كود التفعيل (Security Code)</label>
                            <input type="password" className="custom-input" placeholder="••••••••" />
                        </div>

                        <div className="input-wrapper">
                            <label className="input-label">تحديد القسم</label>
                            <select className="custom-input">
                                <option>وحدة التخدير والعناية</option>
                                <option>قسم الطوارئ</option>
                                <option>الصيانة الهندسية</option>
                            </select>
                        </div>

                        <button className="btn-primary mt-4">تفعيل المنظومة الآن</button>
                    </CustomModal>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
