{/* Persistent QR Code for Mobile Pairing */}
<div className="mt-4 p-4 rounded-3xl bg-white/5 border border-white/10 flex flex-col items-center justify-center relative overflow-hidden group">
    <h3 className="text-xs font-black text-slate-300 mb-2 uppercase tracking-widest text-center">Mobile Connection QR</h3>
    
    <div className="p-2 bg-white rounded-xl shadow-inner">
        {/* رابط توليد الـ QR باستخدام خدمة qrserver وتوجيهه إلى mobile.html */}
        <img 
            src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=http://${localIp}:8000/mobile.html`} 
            alt="QR Code" 
            className="w-32 h-32 object-contain" 
        />
    </div>
    
    <span className="text-[10px] font-bold text-slate-500 mt-3 break-all text-center px-2">
        http://{localIp}:8000/mobile
    </span>
</div>
