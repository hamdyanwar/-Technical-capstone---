<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDICAL ASSISTANT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: #f0f2f5; /* خلفية هادية */
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }
        /* الموديل بنفس ألوانك واستايلك */
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 25px;
            border-radius: 20px;
            width: 85%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            text-align: center;
        }
        h2 { color: #98FF98; margin-bottom: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); } /* Mint Green */
        
        .input-group { margin-bottom: 15px; text-align: right; }
        
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #E6E6FA; /* Light Purple border */
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            box-sizing: border-box; /* عشان ميتطلعش بره المربع */
            outline: none;
        }
        input:focus { border-color: #98FF98; } /* Mint Green focus */

        button {
            width: 100%;
            padding: 15px;
            background: #E6E6FA; /* Light Purple */
            color: #555;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #98FF98; color: white; } /* يقلب Mint Green عند اللمس */
    </style>
</head>
<body>
    <div class="glass">
        <h2>تسجيل الدخول</h2>
        
        <div class="input-group">
            <input type="text" placeholder="اسم المستخدم">
        </div>

        <div class="input-group">
            <input type="number" placeholder="كود المستشفى">
        </div>

        <div class="input-group">
            <select>
                <option value="" disabled selected>اختر الوظيفة...</option>
                <option>طبيب</option>
                <option>ممرض</option>
                <option>فني</option>
            </select>
        </div>

        <button>دخول للمنظومة</button>
    </div>
</body>
</html>
